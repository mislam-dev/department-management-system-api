services:
  api_prod:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: dms-api-production
    ports:
      - 3000:3000
    env_file:
      - .env.production
    environment:
      NODE_ENV: production
      DB_HOST: postgres_prod
      BULL_REDIS_HOST: redis_prod
      CACHE_REDIS_HOST: redis_prod
    restart: unless-stopped
    depends_on:
      postgres_prod:
        condition: service_healthy
      redis_prod:
        condition: service_healthy
    networks:
      - dms_default_prod
  postgres_prod:
    image: postgres:16-alpine
    container_name: dms-database-production
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dms
    ports:
      - "5432:5432"
    volumes:
      - dms_postgres_prod_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dms_default_prod

  redis_prod:
    image: redis/redis-stack:latest
    container_name: dms-redis-production
    ports:
      - "6379:6379"
      - "8002:8001"
    volumes:
      - dms_redis_prod_data:/data
    restart: always
    networks:
      - dms_default_prod
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Prometheus: The Data Collector
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - dms-prometheus-prod-data:/prometheus # <--- Persists your metrics history
    ports:
      - "9090:9090"
    networks:
      - dms_default_prod

  # Grafana: The Visualizer
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000" # Access at localhost:3001
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - dms-grafana-prod-data:/var/lib/grafana # <--- This persists your dashboards
    networks:
      - dms_default_prod

  loki:
    image: grafana/loki:latest
    ports:
      - "3200:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-data:/loki
    networks:
      - dms_default_prod

  promtail:
    image: grafana/promtail:latest
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dms_default_prod

volumes:
  dms_postgres_prod_data:
  dms_redis_prod_data:
  dms-prometheus-prod-data:
  dms-grafana-prod-data:

networks:
  dms_default_prod:
    driver: bridge
