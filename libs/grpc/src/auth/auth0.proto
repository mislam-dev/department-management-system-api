syntax = "proto3";

package auth0;

service Auth0Service {
  rpc CrateUser (Auth0CreateUserDto) returns (Auth0CreateUserResponse) {};
  rpc UpdateUser (Auth0UpdateUserDto) returns (Empty){};
  rpc DeleteUser (UserIdRequest) returns (Empty){};
}

message Auth0CreateUserResponse {
  string user_id= 1;
}

message Auth0CreateUserDto {
  string name= 1;
  string password= 2;
  string email= 3;
}

message Auth0UpdateUserDto {
  string auth0_user_id =1;
  string email = 2;
  string fullName = 3;
}

message UserIdRequest {
  string user_id = 1;
}

message Empty {
}