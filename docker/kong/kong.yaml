_format_version: '3.0'
_transform: true

services:
  - name: auth-service
    protocol: http
    host: host.docker.internal
    port: 3001

    routes:
      - name: auth-routes
        paths:
          - /api/v1/auth
        methods:
          - POST
          - OPTIONS
        strip_path: true
        preserve_host: false
        protocols:
          - http
          - https

plugins:
  - name: rate-limiting
    config:
      minute: 60
      hour: 3600
      policy: local
      fault_tolerant: true

  - name: cors
    config:
      origins:
        - http://localhost:3000
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
      headers:
        - Accept
        - Authorization
        - Content-Type
        - Origin
        - X-Requested-With
      exposed_headers:
        - Authorization
      credentials: true
      max_age: 3600
      preflight_continue: false

  - name: response-transformer
    config:
      add:
        headers:
          - X-Powered-By:Kong
      remove:
        headers:
          - Server
