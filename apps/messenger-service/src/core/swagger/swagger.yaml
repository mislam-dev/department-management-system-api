openapi: 3.0.3
info:
  title: Messenger Service API
  description: 'API for managing conversations, messages, and participants.'
  version: 1.0.0
  contact:
    name: API Support
    email: support@example.com

servers:
  - url: http://localhost:3006/
    description: Local Server

tags:
  - name: Conversations
    description: Chat conversations management
  - name: Messages
    description: Messages in conversations management
  - name: Participants
    description: Conversation participants management

security:
  - bearerAuth: []

paths:
  /conversation:
    post:
      tags: [Conversations]
      summary: Create a P2P conversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateConversationDto'
      responses:
        '201':
          description: Conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Conversations]
      summary: List conversations for current user
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of conversations
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Conversation'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversation/group:
    post:
      tags: [Conversations]
      summary: Create a Group conversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateGroupConversationDto'
      responses:
        '201':
          description: Group conversation created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversation/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Conversations]
      summary: Get conversation by ID
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conversation details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '404':
          $ref: '#/components/responses/NotFound'
        '401':
          $ref: '#/components/responses/Unauthorized'
    patch:
      tags: [Conversations]
      summary: Update conversation
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateConversationDto'
      responses:
        '200':
          description: Conversation updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Conversation'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'
    delete:
      tags: [Conversations]
      summary: Delete conversation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Conversation deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /conversations/{conversationId}/messages:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      tags: [Messages]
      summary: List messages in conversation
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/{conversationId}/messages/{id}:
    parameters:
      - name: conversationId
        in: path
        required: true
        schema:
          type: string
          format: uuid
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
    delete:
      tags: [Messages]
      summary: Delete message
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Message deleted
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

  /conversations/{id}/members:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation ID
    post:
      tags: [Participants]
      summary: Add participant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateParticipantDto'
      responses:
        '201':
          description: Participant added
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
    get:
      tags: [Participants]
      summary: List participants
      security:
        - bearerAuth: []
      responses:
        '200':
          description: List of participants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Participant'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /conversations/{id}/members/{participantId}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Conversation ID
      - name: participantId
        in: path
        required: true
        schema:
          type: string
          format: uuid
        description: Participant ID
    patch:
      tags: [Participants]
      summary: Update participant
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateParticipantDto'
      responses:
        '200':
          description: Participant updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Participant'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    # Entities
    Conversation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        type:
          $ref: '#/components/schemas/ConversationType'
        name:
          type: string
          nullable: true
        isRestricted:
          type: boolean
        createdAt:
          type: string
          format: date-time
        participants:
          type: array
          items:
            $ref: '#/components/schemas/Participant'
      required: [id, type, createdAt]

    Message:
      type: object
      properties:
        id:
          type: string
          format: uuid
        content:
          type: string
        senderId:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
      required: [id, content, senderId, conversationId, createdAt]

    Participant:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/ParticipantRole'
        lastReadAt:
          type: string
          format: date-time
          nullable: true
      required: [id, userId, conversationId, role]

    # Enums
    ConversationType:
      type: string
      enum: [P2P, GROUP]

    ParticipantRole:
      type: string
      enum: [ADMIN, MEMBER]

    # DTOs
    CreateConversationDto:
      type: object
      required: [memberId]
      properties:
        isRestricted:
          type: boolean
        memberId:
          type: string
          format: uuid
        name:
          type: string

    CreateGroupConversationDto:
      type: object
      required: [members, name]
      properties:
        isRestricted:
          type: boolean
        members:
          type: array
          items:
            type: string
            format: uuid
        name:
          type: string

    UpdateConversationDto:
      type: object
      properties:
        isRestricted:
          type: boolean
        memberId:
          type: string
          format: uuid
        name:
          type: string

    CreateMessageDto:
      type: object
      required: [content, senderId, conversationId]
      properties:
        content:
          type: string
        senderId:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid

    CreateParticipantDto:
      type: object
      required: [userId, conversationId]
      properties:
        userId:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/ParticipantRole'

    UpdateParticipantDto:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        conversationId:
          type: string
          format: uuid
        role:
          $ref: '#/components/schemas/ParticipantRole'

    ErrorResponse:
      type: object
      properties:
        statusCode:
          type: integer
        message:
          type: string
        error:
          type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
