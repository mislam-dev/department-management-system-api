                    type: number
                    default: 1
                  limit:
                    type: number
                    default: 10
                  offset:
                    type: number
                    default: 0
                  results:
                    type: array
                    items:
                      $ref: '#/components/schemas/Student'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
    post:
      tags:
        - Students
      summary: Create student record
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
