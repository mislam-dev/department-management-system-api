components:
  schemas:
    UserData:
      type: object
      properties:
        id:
          type: string
        email:
          type: string
          format: email
        fullName:
          type: string
        auth0_role:
          type: string
        auth0_user_id:
          type: string
        designation:
          $ref: '#/components/schemas/DesignationEnum'
        created_at:
          type: string
        updatedAt:
          type: string
      required:
        - id
        - email
        - username
    UserDTO:
      type: object
      required:
        - email
        - password
        - designation
        - fullName
      properties:
        email:
          type: string
          format: email
        password:
          type: string
        username:
          type: string
        fullName:
          type: string
        designation:
          $ref: '#/components/schemas/DesignationEnum'
        role:
          type: string
    UserUpdateDTO:
      $ref: '#/components/schemas/UserDTO'
    Student:
      type: object
      properties:
        id:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        enrolmentDate:
          type: string
          format: date
        status:
          type: string
          default: ACTIVE
        session:
          type: string
          default: 2021-22
        graduationYear:
          type: integer
          default: 2026
        currentSemesterId:
          type: string
          format: uuid
      required:
        - id
        - userId
        - status
        - session
        - currentSemesterId
    StudentCreateDTO:
      type: object
      required:
        - email
        - password
        - fullName
        - session
        - designation
        - enrolmentDate
        - currentSemesterId
      properties:
        email:
          type: string
          format: email
        fullName:
          type: string
        password:
          type: string
          minLength: 6
        enrolmentDate:
          type: string
          format: date-time
        status:
          type: string
          enum:
            - ACTIVE
            - INACTIVE
            - SUSPENDED
            - GRADUATED
          nullable: true
        session:
          type: string
          nullable: true
        graduationYear:
          type: integer
          format: int32
          nullable: true
        currentSemesterId:
          type: string
          format: uuid
