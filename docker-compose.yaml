services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms_api
    ports:
      - 3000:3000
    env_file: .env
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
      - ./logs:/app/logs
    environment:
      DB_HOST: postgres
      BULL_REDIS_HOST: redis
      CACHE_REDIS_HOST: redis
    restart: unless-stopped
    command: pnpm start:dev
    networks:
      - dms_default
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16-alpine
    container_name: dms-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dms
    ports:
      - "5432:5432"
    volumes:
      - dms_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dms_default

  redis:
    image: redis/redis-stack:latest
    container_name: dms-redis
    ports:
      - "6379:6379"
      - "8002:8001"
    volumes:
      - dms_redis_data:/data
    restart: always
    networks:
      - dms_default

  # Prometheus: The Data Collector
  prometheus:
    image: prom/prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus-data:/prometheus # <--- Persists your metrics history
    ports:
      - "9090:9090"
    networks:
      - dms_default

  # Grafana: The Visualizer
  grafana:
    image: grafana/grafana
    ports:
      - "3001:3000" # Access at localhost:3001
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana-storage:/var/lib/grafana # <--- This persists your dashboards
    networks:
      - dms_default

  loki:
    image: grafana/loki:latest
    ports:
      - "3200:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-data:/loki
    networks:
      - dms_default

  promtail:
    image: grafana/promtail:latest
    user: root
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - ./promtail-config.yml:/etc/promtail/config.yml
    command: -config.file=/etc/promtail/config.yml
    networks:
      - dms_default

volumes:
  dms_data:
  dms_redis_data:
  grafana-storage:
  prometheus-data:

networks:
  dms_default:
    driver: bridge
