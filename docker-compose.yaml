include:
  - path: "./docker/monitoring.yaml"
  - path: "./docker/kong/kong-docker.yaml"
services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms-api
    ports:
      - 3001:3000
    env_file: .env
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
      - ./logs:/app/logs
    environment:
      PORT: 3000
      DB_HOST: postgres
      BULL_REDIS_HOST: redis
      CACHE_REDIS_HOST: redis
    restart: unless-stopped
    command: pnpm start:dev dms
    networks:
      - dms_default
    depends_on:
      - postgres
      - redis
  postgres:
    image: postgres:16-alpine
    container_name: dms-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: dms
    ports:
      - "5432:5432"
    volumes:
      - dms_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - dms_default

  redis:
    image: redis/redis-stack:latest
    container_name: dms-redis
    ports:
      - "6379:6379"
      - "4000:8001"
    volumes:
      - dms_redis_data:/data
    restart: always
    networks:
      - dms_default

  auth_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms-auth-service
    ports:
      - 3002:3000
    env_file: ./apps/auth-service/.env
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
    environment:
      PORT: 3000
      AUTH0_CALLBACK_URL: http://localhost:3002/auth/callback
      DB_HOST: postgres
    restart: unless-stopped
    command: pnpm start:dev auth-service
    networks:
      - dms_default
    depends_on:
      - postgres

  # USER SERVICE
  user_service:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms-user-service
    ports:
      - 3003:3000
    env_file: ./apps/user-service/.env
     
    volumes:
      - .:/app
      - ./node_modules:/app/node_modules
    environment:
      PORT: 3000
      DB_HOST: user_service_db
      DB_NAME: user_service
    restart: unless-stopped
    command: pnpm start:dev user-service
    networks:
      - dms_default
      - user_service
    depends_on:
      - user_service_db

  user_service_db:
    image: postgres:16-alpine
    container_name: dms-user-service-database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: user_service
    volumes:
      - user_service_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - user_service

  
volumes:
  dms_data:
  dms_redis_data:
  user_service_data:

networks:
  dms_default:
    driver: bridge
  user_service:
    driver: bridge
